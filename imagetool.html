<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lezugo · Image Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0f0e0c;
–surface: #1a1916;
–border: #2e2c28;
–accent: #f0a500;
–accent2: #e05c2a;
–text: #f0ede6;
–muted: #7a776e;
–canvas-bg: #252320;
}

body {
font-family: ‘DM Mono’, monospace;
background: var(–bg);
color: var(–text);
min-height: 100vh;
padding: 32px 24px 60px;
}

header {
display: flex;
align-items: baseline;
gap: 16px;
margin-bottom: 40px;
}

header h1 {
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 26px;
letter-spacing: -0.5px;
color: var(–accent);
}

header span {
font-size: 12px;
color: var(–muted);
letter-spacing: 0.1em;
}

/* Format Selector */
.format-tabs {
display: flex;
gap: 8px;
margin-bottom: 32px;
flex-wrap: wrap;
}

.tab {
cursor: pointer;
border: 1px solid var(–border);
background: var(–surface);
color: var(–muted);
padding: 10px 18px;
border-radius: 6px;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
letter-spacing: 0.05em;
transition: all 0.15s ease;
display: flex;
flex-direction: column;
gap: 2px;
min-width: 140px;
}

.tab .tab-name {
font-family: ‘Syne’, sans-serif;
font-size: 13px;
font-weight: 700;
color: var(–text);
}

.tab .tab-dims {
font-size: 11px;
color: var(–muted);
}

.tab:hover {
border-color: var(–accent);
color: var(–text);
}

.tab.active {
border-color: var(–accent);
background: rgba(240, 165, 0, 0.08);
color: var(–text);
}

.tab.active .tab-name { color: var(–accent); }

/* Main Layout */
.workspace {
display: flex;
gap: 28px;
flex-wrap: wrap;
align-items: flex-start;
}

/* Canvas Area */
.canvas-wrap {
position: relative;
flex-shrink: 0;
}

.canvas-label {
font-size: 11px;
letter-spacing: 0.12em;
color: var(–muted);
margin-bottom: 10px;
text-transform: uppercase;
}

.canvas-outer {
position: relative;
border: 1px solid var(–border);
border-radius: 8px;
overflow: hidden;
background: var(–canvas-bg);
cursor: crosshair;
transition: border-color 0.2s;
}

.canvas-outer.drag-over {
border-color: var(–accent);
box-shadow: 0 0 0 2px rgba(240,165,0,0.2);
}

canvas {
display: block;
}

.empty-hint {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 8px;
pointer-events: none;
opacity: 1;
transition: opacity 0.2s;
}

.empty-hint.hidden { opacity: 0; }

.empty-hint svg {
width: 36px;
height: 36px;
stroke: var(–muted);
stroke-width: 1.5;
fill: none;
}

.empty-hint p {
font-size: 12px;
color: var(–muted);
text-align: center;
line-height: 1.6;
}

/* Controls */
.controls {
display: flex;
flex-direction: column;
gap: 16px;
min-width: 200px;
max-width: 260px;
}

.ctrl-section {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 16px;
}

.ctrl-label {
font-size: 10px;
letter-spacing: 0.14em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 10px;
}

.btn {
width: 100%;
padding: 10px 14px;
border-radius: 6px;
border: 1px solid var(–border);
background: transparent;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
cursor: pointer;
transition: all 0.15s;
display: flex;
align-items: center;
gap: 8px;
letter-spacing: 0.04em;
margin-bottom: 6px;
}

.btn:last-child { margin-bottom: 0; }

.btn:hover {
border-color: var(–accent);
color: var(–accent);
}

.btn.primary {
background: var(–accent);
border-color: var(–accent);
color: #0f0e0c;
font-weight: 500;
}

.btn.primary:hover {
background: #ffc02e;
border-color: #ffc02e;
color: #0f0e0c;
}

.btn:disabled {
opacity: 0.35;
cursor: not-allowed;
}

.btn:disabled:hover {
border-color: var(–border);
color: var(–text);
}

/* Scale slider */
.slider-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 10px;
}

.slider-row label {
font-size: 11px;
color: var(–muted);
min-width: 38px;
}

input[type=range] {
-webkit-appearance: none;
flex: 1;
height: 3px;
background: var(–border);
border-radius: 2px;
outline: none;
}

input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 14px;
height: 14px;
border-radius: 50%;
background: var(–accent);
cursor: pointer;
transition: transform 0.1s;
}

input[type=range]::-webkit-slider-thumb:hover {
transform: scale(1.2);
}

.slider-val {
font-size: 11px;
color: var(–text);
min-width: 36px;
text-align: right;
}

/* Status */
.status {
font-size: 11px;
color: var(–muted);
margin-top: 12px;
letter-spacing: 0.04em;
min-height: 16px;
}

.status.ok { color: #6dbf7a; }

/* File input hidden */
#file-input { display: none; }

/* Tip at bottom */
.tip {
font-size: 11px;
color: var(–muted);
margin-top: 6px;
line-height: 1.7;
}
</style>

</head>
<body>

<header>
  <h1>Image Tool</h1>
  <span>Lezugo · Asset Export</span>
</header>

<!-- Format Tabs -->

<div class="format-tabs">
  <div class="tab active" data-fmt="vocabulary">
    <span class="tab-name">Vocabulary</span>
    <span class="tab-dims">265 × 265 px</span>

  </div>

  <!-- Controls -->

  <div class="controls">

<div class="ctrl-section">
  <div class="ctrl-label">Bild laden</div>
  <button class="btn" onclick="document.getElementById('file-input').click()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

    Als JPG speichern
  </button>

```

  </div>
</div>

<script>
const FORMATS = {
  vocabulary: { w: 265, h: 265, name: 'vocabulary' },
  image:      { w: 470, h: 265, name: 'image' },
  lesson:     { w: 470, h: 242, name: 'lesson-cover' },
};

let currentFmt = 'vocabulary';
let img = null;
let scale = 1;
let offsetX = 0, offsetY = 0;
let dragging = false;
let dragStart = { mx: 0, my: 0, ox: 0, oy: 0 };

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const outer = document.getElementById('canvas-outer');
const hint = document.getElementById('empty-hint');
const dimsLabel = document.getElementById('dims-label');
const scaleSlider = document.getElementById('scale-slider');
const scaleVal = document.getElementById('scale-val');
const offsetXInput = document.getElementById('offset-x');
const offsetYInput = document.getElementById('offset-y');
const offsetXVal = document.getElementById('offset-x-val');
const offsetYVal = document.getElementById('offset-y-val');
const downloadBtn = document.getElementById('download-btn');
const status = document.getElementById('status');
const fileInput = document.getElementById('file-input');

// Max display size (canvas shown at 1:1 or scaled down)
const MAX_DISPLAY = 500;

function getFmt() { return FORMATS[currentFmt]; }

function setFormat(key) {
  currentFmt = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.fmt === key));
  applyFormat();
}

function applyFormat() {
  const f = getFmt();
  canvas.width = f.w;
  canvas.height = f.h;
  // Scale down display if too big
  const displayScale = Math.min(1, MAX_DISPLAY / Math.max(f.w, f.h));
  canvas.style.width = (f.w * displayScale) + 'px';
  canvas.style.height = (f.h * displayScale) + 'px';
  dimsLabel.textContent = `${f.w} × ${f.h} px`;
  draw();
}

function draw() {
  const f = getFmt();
  ctx.clearRect(0, 0, f.w, f.h);
  // Checkerboard background
  const sz = 12;
  for (let y = 0; y < f.h; y += sz) {
    for (let x = 0; x < f.w; x += sz) {
      ctx.fillStyle = ((x / sz + y / sz) % 2 === 0) ? '#2a2826' : '#222120';
      ctx.fillRect(x, y, sz, sz);
    }
  }
  if (img) {
    const w = img.naturalWidth * scale;
    const h = img.naturalHeight * scale;
    ctx.drawImage(img, offsetX, offsetY, w, h);
  }
}

function loadImage(src) {
  const i = new Image();
  i.onload = () => {
    img = i;
    fitImage();
    hint.classList.add('hidden');
    downloadBtn.disabled = false;
    status.textContent = '';
    canvas.style.cursor = 'grab';
    draw();
  };
  i.onerror = () => {
    status.textContent = 'Fehler beim Laden des Bildes.';
  };
  i.src = src;
}

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    status.textContent = 'Bitte eine Bilddatei wählen.';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => loadImage(e.target.result);
  reader.onerror = () => { status.textContent = 'Datei konnte nicht gelesen werden.'; };
  reader.readAsDataURL(file);
}

function fitImage() {
  if (!img) return;
  const f = getFmt();
  const scaleX = f.w / img.naturalWidth;
  const scaleY = f.h / img.naturalHeight;
  scale = Math.min(scaleX, scaleY);
  offsetX = (f.w - img.naturalWidth * scale) / 2;
  offsetY = (f.h - img.naturalHeight * scale) / 2;
  syncSlider();
  syncOffsetInputs();
  draw();
}

function fillImage() {
  if (!img) return;
  const f = getFmt();
  const scaleX = f.w / img.naturalWidth;
  const scaleY = f.h / img.naturalHeight;
  scale = Math.max(scaleX, scaleY);
  offsetX = (f.w - img.naturalWidth * scale) / 2;
  offsetY = (f.h - img.naturalHeight * scale) / 2;
  syncSlider();
  syncOffsetInputs();
  draw();
}

function syncSlider() {
  const pct = Math.round(scale * 100);
  scaleSlider.value = Math.max(10, Math.min(300, pct));
  scaleVal.textContent = pct + '%';
}

function syncOffsetInputs() {
  const rx = Math.round(offsetX);
  const ry = Math.round(offsetY);
  offsetXInput.value = Math.max(-500, Math.min(500, rx));
  offsetYInput.value = Math.max(-500, Math.min(500, ry));
  offsetXVal.textContent = rx;
  offsetYVal.textContent = ry;
}

// Tabs
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => setFormat(t.dataset.fmt));
});

// Scale slider
scaleSlider.addEventListener('input', () => {
  if (!img) return;
  const f = getFmt();
  const newScale = parseInt(scaleSlider.value) / 100;
  // Keep center stable
  const cx = offsetX + img.naturalWidth * scale / 2;
  const cy = offsetY + img.naturalHeight * scale / 2;
  scale = newScale;
  offsetX = cx - img.naturalWidth * scale / 2;
  offsetY = cy - img.naturalHeight * scale / 2;
  scaleVal.textContent = scaleSlider.value + '%';
  syncOffsetInputs();
  draw();
});

// Offset sliders
offsetXInput.addEventListener('input', () => {
  offsetX = parseInt(offsetXInput.value);
  offsetXVal.textContent = offsetX;
  draw();
});
offsetYInput.addEventListener('input', () => {
  offsetY = parseInt(offsetYInput.value);
  offsetYVal.textContent = offsetY;
  draw();
});

// Fit / Fill / Reset
document.getElementById('fit-btn').addEventListener('click', fitImage);
document.getElementById('fill-btn').addEventListener('click', fillImage);
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!img) return;
  scale = 1;
  offsetX = 0; offsetY = 0;
  syncSlider();
  syncOffsetInputs();
  draw();
});

// File input
fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  loadFile(f);
  fileInput.value = '';
});

// Paste button — tries clipboard API, falls back to instructing Ctrl+V
document.getElementById('paste-btn').addEventListener('click', async () => {
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      for (const type of item.types) {
        if (type.startsWith('image/')) {
          const blob = await item.getType(type);
          const reader = new FileReader();
          reader.onload = ev => loadImage(ev.target.result);
          reader.readAsDataURL(blob);
          return;
        }
      }
    }
    status.textContent = 'Kein Bild in der Zwischenablage — bitte Ctrl+V versuchen.';
  } catch {
    status.textContent = 'Bitte Ctrl+V direkt im Fenster drücken.';
  }
});

// Ctrl+V paste
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      loadFile(item.getAsFile());
      return;
    }
  }
});

// Drag & Drop on canvas
outer.addEventListener('dragover', e => { e.preventDefault(); outer.classList.add('drag-over'); });
outer.addEventListener('dragleave', () => outer.classList.remove('drag-over'));
outer.addEventListener('drop', e => {
  e.preventDefault();
  outer.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) {
    loadFile(f);
  }
});

// Mouse drag to reposition image on canvas
function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

canvas.addEventListener('mousedown', e => {
  if (!img) return;
  dragging = true;
  const c = canvasCoords(e);
  dragStart = { mx: c.x, my: c.y, ox: offsetX, oy: offsetY };
  canvas.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const c = canvasCoords(e);
  offsetX = dragStart.ox + (c.x - dragStart.mx);
  offsetY = dragStart.oy + (c.y - dragStart.my);
  syncOffsetInputs();
  draw();
});

window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.style.cursor = img ? 'grab' : 'crosshair';
});

// Mouse wheel zoom
canvas.addEventListener('wheel', e => {
  if (!img) return;
  e.preventDefault();
  const c = canvasCoords(e);
  const delta = e.deltaY < 0 ? 1.08 : 0.92;
  const newScale = Math.max(0.1, Math.min(3, scale * delta));
  // Zoom toward cursor
  offsetX = c.x - (c.x - offsetX) * (newScale / scale);
  offsetY = c.y - (c.y - offsetY) * (newScale / scale);
  scale = newScale;
  syncSlider();
  syncOffsetInputs();
  draw();
}, { passive: false });

// Download
downloadBtn.addEventListener('click', () => {
  if (!img) return;
  const f = getFmt();
  // Draw onto a fresh canvas with white background (JPEG has no alpha)
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = f.w;
  exportCanvas.height = f.h;
  const ectx = exportCanvas.getContext('2d');
  ectx.fillStyle = '#ffffff';
  ectx.fillRect(0, 0, f.w, f.h);
  if (img) {
    ectx.drawImage(img, offsetX, offsetY, img.naturalWidth * scale, img.naturalHeight * scale);
  }
  const dataUrl = exportCanvas.toDataURL('image/jpeg', 0.75);
  const link = document.createElement('a');
  link.download = `lezugo-${f.name}-${f.w}x${f.h}.jpg`;
  link.href = dataUrl;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  status.classList.add('ok');
  status.textContent = '✓ Gespeichert';
  setTimeout(() => { status.classList.remove('ok'); status.textContent = ''; }, 2500);
});

// Init
applyFormat();
</script>

</body>
</html>
