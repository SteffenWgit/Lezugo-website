<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Confirmed - Lezugo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f7f3;
      color: #2b2b2b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 500px;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      display: none;
    }

    h1 {
      margin-top: 0;
    }

    p {
      line-height: 1.6;
    }
  </style>

  <script>
    window.onload = function () {
      const params = window.location.search + window.location.hash;

      window.location.href =
        "lezugo://auth/callback" + params;

      setTimeout(() => {
        document.getElementById("fallback").style.display = "block";
      }, 2000);
    };
  </script>
</head>
<body>
  <div class="card" id="fallback">
    <h1>Account confirmed</h1>

    <p>
      Your Lezugo account has been successfully confirmed.
    </p>

    <p>
      You can now return to the Lezugo app and sign in.
    </p>
  </div>
</body>
</html>
